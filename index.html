<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #1a1a1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 0.4rem;
    }

    .date {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 3rem;
    }

    .feeds {
      display: flex;
      gap: 2rem;
    }

    .feeds a {
      display: block;
      padding: 1.8rem 3rem;
      border: 1px solid #333;
      border-radius: 6px;
      text-decoration: none;
      color: #e0e0e0;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      transition: border-color 0.2s, color 0.2s;
    }

    .feeds a:hover {
      border-color: #888;
      color: #fff;
    }

    .feeds a .sub {
      display: block;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.72rem;
      color: #666;
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    @media (max-width: 500px) {
      .feeds {
        flex-direction: column;
        gap: 1rem;
      }

      .feeds a {
        padding: 1.4rem 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Feed</h1>
    <div class="date">May 22, 2026</div>
    <div class="feeds">
      <a href="ben.html">
        Ben
        <span class="sub">10 stories</span>
      </a>
      <a href="brian.html">
        Brian
        <span class="sub">10 stories</span>
      </a>
    </div>
  </div>
</body>
</html>
